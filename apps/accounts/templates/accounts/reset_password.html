{% extends 'base.html' %}
{% block title %}Reset Password - NexaBank{% endblock %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 0.5rem; text-align: center;">Set New Password</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Enter your new secure password below.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password ✨</button>
        </form>
    </div>
</div>
{% endblock %}
