{% extends 'base.html' %}
{% block title %}Forgot Password - NexaBank{% endblock %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 0.5rem; text-align: center;">Forgot Password</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Enter your email to receive a password reset OTP.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Request 🚀</button>
        </form>
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
            <p style="color: var(--text-muted)">Remembered your password? <a href="{% url 'accounts:login' %}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
