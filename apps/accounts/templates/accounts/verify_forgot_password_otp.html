{% extends 'base.html' %}
{% block title %}Verify OTP - NexaBank{% endblock %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 0.5rem; text-align: center;">Verify Reset OTP</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Enter the 6-digit code sent to {{ email }}.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">6-Digit OTP</label>
                <input type="text" name="otp" class="form-control" maxlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify OTP</button>
        </form>
    </div>
</div>
{% endblock %}
