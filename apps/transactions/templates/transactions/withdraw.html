{% extends 'base.html' %}

{% block title %}Make a Withdrawal - NexaBank{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto;">
    <h2>Withdraw Funds</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Securely withdraw funds from your NexaBank account.</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Select Account</label>
            <select name="account_id" class="form-control" required style="padding: 1rem; appearance: none; cursor: pointer;">
                <option value="" disabled selected>Select source account</option>
                {% for acc in accounts %}
                    <option value="{{ acc.id }}">{{ acc.get_account_type_display }} (....{{ acc.account_number|slice:"-4:" }}) - Bal: ₹{{ acc.balance }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">Amount (₹)</label>
            <input type="number" name="amount" class="form-control" step="0.01" min="1" placeholder="0.00" required style="font-size: 1.5rem; padding: 1rem;" />
        </div>
        
        <button type="submit" class="btn btn-secondary" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem; border-color: var(--primary); color: white;">Confirm Withdrawal</button>
    </form>
</div>
{% endblock %}
