{% extends 'base.html' %}

{% block title %}Transfer Funds - NexaBank{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto;">
    <h2>Transfer Funds</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Send money instantly to any NexaBank account securely.</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">From Account</label>
            <select name="from_account_id" class="form-control" required style="padding: 1rem; appearance: none; cursor: pointer;">
                <option value="" disabled selected>Select source account</option>
                {% for acc in accounts %}
                    <option value="{{ acc.id }}">{{ acc.get_account_type_display }} (....{{ acc.account_number|slice:"-4:" }}) - Bal: ₹{{ acc.balance }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">To Account Number</label>
            <input type="text" name="to_account_number" class="form-control" placeholder="10 digit account number" required style="padding: 1rem; font-family: monospace; letter-spacing: 2px;" />
        </div>
        
        <div class="form-group">
            <label class="form-label">Amount (₹)</label>
            <input type="number" name="amount" class="form-control" step="0.01" min="1" placeholder="0.00" required style="font-size: 1.5rem; padding: 1rem;" />
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem; background: linear-gradient(135deg, var(--secondary), #0d9488);">Proceed with Transfer 💸</button>
    </form>
</div>
{% endblock %}
